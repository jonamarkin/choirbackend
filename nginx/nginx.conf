upstream web {
    server web:8000;
}

server {
    listen 80;
    server_name choirbackend.morpheusgh.co www.choirbackend.morpheusgh.co;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name choirbackend.morpheusgh.co www.choirbackend.morpheusgh.co;
    client_max_body_size 10M;

    ssl_certificate /etc/letsencrypt/live/choirbackend.morpheusgh.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/choirbackend.morpheusgh.co/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
